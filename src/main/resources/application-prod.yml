# 生产环境配置
# 激活方式: SPRING_PROFILES_ACTIVE=prod

server:
  port: ${APP_PORT:8080}
  # 生产环境关闭错误堆栈返回，防止信息泄露
  error:
    include-stacktrace: never
    include-message: always

spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    timeout: 3s
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2s
          max-attempts: 3
          max-interval: 10s

management:
  endpoints:
    web:
      exposure:
        # 生产环境只暴露健康检查和 Prometheus 指标
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  file:
    name: ${LOG_FILE:/app/logs/logistics-management.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: WARN
    jimmy: INFO
    org.springframework: WARN

# XXL-Job 执行器配置（定时任务）
# 调度中心地址由 XXL_JOB_ADMIN_ADDRESSES 环境变量注入
xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:false}
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:logistics-app}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:/app/logs/xxl-job}
