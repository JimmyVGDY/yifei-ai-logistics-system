spring:
  application:
    name: practice-project-about-develop
  config:
    import:
      - optional:nacos:spring-ai.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      discovery:
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:}
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}
      config:
        namespace: ${NACOS_CONFIG_NAMESPACE:}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        refresh-enabled: true
        extension-configs:
          - data-id: spring-ai.yml
            group: DEFAULT_GROUP
            refresh: true
