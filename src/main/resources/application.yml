server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:30MB}
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/logistics_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:5s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2.0
          max-attempts: 3
          max-interval: 5s
        default-requeue-rejected: false
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30s}
  data:
    elasticsearch:
      repositories:
        enabled: true
  ai:
    openai:
      # OpenAI 兼容模型配置：真实密钥只允许通过环境变量提供，不写入仓库。
      api-key: ${SPRING_AI_OPENAI_API_KEY:missing}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:gpt-4o-mini}
    ollama:
      # Ollama 本地 Embedding 服务（Windows 端运行，WSL 通过 host IP 访问）
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        enabled: true
        model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
  cloud:
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${SENTINEL_API_PORT:8719}
        heartbeat-interval-ms: ${SENTINEL_HEARTBEAT_INTERVAL_MS:10000}
      filter:
        enabled: true
      web-context-unify: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,sentinel
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

sa-token:
  token-name: ${SA_TOKEN_NAME:satoken}
  timeout: ${SA_TOKEN_TIMEOUT:86400}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:1800}
  is-concurrent: ${SA_TOKEN_IS_CONCURRENT:false}
  is-share: ${SA_TOKEN_IS_SHARE:false}
  token-style: ${SA_TOKEN_STYLE:uuid}
  is-log: ${SA_TOKEN_IS_LOG:true}

logging:
  file:
    name: ${LOG_FILE:logs/logistics-management.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    jimmy: ${APP_LOG_LEVEL:info}
    com.alibaba.nacos: info
    com.alibaba.csp.sentinel: info
    jimmy.mapper: ${MYBATIS_SQL_LOG_LEVEL:info}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: jimmy.system.entity, jimmy.auth.entity, jimmy.logistics.entity, jimmy.ai.model, jimmy.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:false}
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:logistics-app}
      port: ${XXL_JOB_EXECUTOR_PORT:10999}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:logs/xxl-job}

app:
  bloom-filter:
    expected-insertions: ${BLOOM_FILTER_EXPECTED_INSERTIONS:100000}
    false-positive-probability: ${BLOOM_FILTER_FALSE_POSITIVE_PROBABILITY:0.01}
  rabbitmq:
    demo-exchange: ${RABBITMQ_DEMO_EXCHANGE:practice.demo.exchange}
    demo-queue: ${RABBITMQ_DEMO_QUEUE:practice.demo.queue}
    demo-routing-key: ${RABBITMQ_DEMO_ROUTING_KEY:practice.demo.routing-key}
  # 敏感字段加密开关（默认开启，开发环境可设为 false 跳过加密）
  encrypt:
    enabled: ${APP_ENCRYPT_ENABLED:true}
  logistics:
    cache-prefix: ${LOGISTICS_CACHE_PREFIX:logistics}
    order-cache-ttl-seconds: ${LOGISTICS_ORDER_CACHE_TTL_SECONDS:1800}
    mq:
      order-exchange: ${LOGISTICS_ORDER_EXCHANGE:logistics.order.exchange}
      order-created-queue: ${LOGISTICS_ORDER_CREATED_QUEUE:logistics.order.created.queue}
      order-created-routing-key: ${LOGISTICS_ORDER_CREATED_ROUTING_KEY:logistics.order.created}
  local-frontend:
    auto-start: ${LOCAL_FRONTEND_AUTO_START:true}
    auto-open: ${LOCAL_FRONTEND_AUTO_OPEN:true}
    url: ${LOCAL_FRONTEND_URL:http://127.0.0.1:5173}
    working-directory: ${LOCAL_FRONTEND_WORKING_DIRECTORY:frontend}
  ai:
    # ── Python AI 服务 ──
    python:
      enabled: ${APP_AI_PYTHON_ENABLED:false}       # 开发环境开启，生产暂默认关
      base-url: ${APP_AI_PYTHON_BASE_URL:http://127.0.0.1:8001}
      timeout-seconds: ${APP_AI_PYTHON_TIMEOUT_SECONDS:180}
    conversation-ttl-seconds: ${APP_AI_CONVERSATION_TTL_SECONDS:3600}
    tool:
      max-calls: ${APP_AI_TOOL_MAX_CALLS:8}
    query-cursor:
      ttl-minutes: ${APP_AI_QUERY_CURSOR_TTL_MINUTES:60}
    token-usage:
      enabled: ${APP_AI_TOKEN_USAGE_ENABLED:true}
    prompt:
      db-enabled: ${APP_AI_PROMPT_DB_ENABLED:true}
      fallback-enabled: ${APP_AI_PROMPT_FALLBACK_ENABLED:true}
    sse:
      timeout-ms: ${APP_AI_SSE_TIMEOUT_MS:180000}
      legacy-get-enabled: ${APP_AI_SSE_LEGACY_GET_ENABLED:false}
      heartbeat-seconds: ${APP_AI_SSE_HEARTBEAT_SECONDS:10}
    rag:
      enabled: ${APP_AI_RAG_ENABLED:${APP_AI_MEMORY_QDRANT_ENABLED:true}}
      index-on-startup: ${APP_AI_RAG_INDEX_ON_STARTUP:true}
      qdrant:
        base-url: ${APP_AI_RAG_QDRANT_BASE_URL:${APP_AI_MEMORY_QDRANT_BASE_URL:http://127.0.0.1:6333}}
        collection: ${APP_AI_RAG_QDRANT_COLLECTION:logistics_docs}
    memory:
      qdrant:
        enabled: ${APP_AI_MEMORY_QDRANT_ENABLED:true}
        base-url: ${APP_AI_MEMORY_QDRANT_BASE_URL:http://127.0.0.1:6333}
        collection: ${APP_AI_MEMORY_QDRANT_COLLECTION:logistics_ai_user_memory}
  auth:
    admin:
      username: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:}
  operation-log:
    retention-days: ${APP_OPERATION_LOG_RETENTION_DAYS:180}
  upload:
    root-directory: ${APP_UPLOAD_ROOT:uploads}
