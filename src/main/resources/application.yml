server:
  port: ${SERVER_PORT:8080}

spring:
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:5s}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          max-interval: 5s
        default-requeue-rejected: false
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30s}
  data:
    elasticsearch:
      repositories:
        enabled: true
  cloud:
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${SENTINEL_API_PORT:8719}
      filter:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,sentinel
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.alibaba.nacos: info
    com.alibaba.csp.sentinel: info

app:
  bloom-filter:
    expected-insertions: ${BLOOM_FILTER_EXPECTED_INSERTIONS:100000}
    false-positive-probability: ${BLOOM_FILTER_FALSE_POSITIVE_PROBABILITY:0.01}
  rabbitmq:
    demo-exchange: ${RABBITMQ_DEMO_EXCHANGE:practice.demo.exchange}
    demo-queue: ${RABBITMQ_DEMO_QUEUE:practice.demo.queue}
    demo-routing-key: ${RABBITMQ_DEMO_ROUTING_KEY:practice.demo.routing-key}
