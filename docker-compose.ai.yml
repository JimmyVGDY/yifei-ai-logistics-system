services:
  app:
    environment:
      APP_AI_PYTHON_ENABLED: "true"
      APP_AI_PYTHON_BASE_URL: http://ai-service:8001
      APP_AI_MEMORY_QDRANT_ENABLED: "true"
      APP_AI_MEMORY_QDRANT_BASE_URL: http://qdrant:6333
      APP_AI_RAG_QDRANT_BASE_URL: http://qdrant:6333
      AI_INTERNAL_SHARED_SECRET: ${AI_INTERNAL_SHARED_SECRET:?AI_INTERNAL_SHARED_SECRET is required when AI compose is enabled}

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: logistics-ai-service
    restart: unless-stopped
    environment:
      JAVA_INTERNAL_URL: http://app:8080
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      AI_INTERNAL_SHARED_SECRET: ${AI_INTERNAL_SHARED_SECRET:?AI_INTERNAL_SHARED_SECRET is required when AI compose is enabled}
    ports:
      - "${AI_SERVICE_BIND:-127.0.0.1}:${AI_SERVICE_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - logistics-net

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: logistics-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_BIND:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz | grep -q ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - logistics-net

volumes:
  qdrant_data:
    driver: local
