# ==========================================
# Prometheus 监控采集配置
# ==========================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则文件
rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  # ---- Spring Boot 应用指标 ----
  - job_name: "logistics-app"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: "logistics-app"
          env: "production"

  # ---- Prometheus 自身 ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
