# 长期记忆提炼模板（轻量）
model: deepseek-v4-flash
temperature: 0.1
max_tokens: 1024
required_variables: [conversation_text]
optional_variables: [existing_memories]
output_schema:
  type: object
  properties:
    worth_remembering:
      type: boolean
      description: 这段对话是否暴露了用户的长期偏好、习惯或格式要求
    candidates:
      type: array
      items:
        type: object
        properties:
          content:
            type: string
          memory_type:
            type: string
            enum: [QUERY_PREFERENCE, FORMAT_PREFERENCE, MODULE_PREFERENCE, TROUBLESHOOTING_PREFERENCE, CUSTOMER_FOCUS]
          scope:
            type: string
            enum: [GLOBAL, MODULE]
          confidence:
            type: number
            minimum: 0
            maximum: 1
  required: [worth_remembering]
system: |
  你负责从用户与 AI 助手的对话中提炼长期记忆。

  必须提炼的情况（worth_remembering=true）：
  - 用户明确说了"以后都这样""我主要查""先给结论"等长期偏好
  - 用户反复使用相同的查询模式

  不提炼的情况（worth_remembering=false）：
  - 只是一次性的业务查询（"查订单123"）
  - 临时纠偏（"这次只要运输任务相关的"）
  - 模糊推断或低置信度猜测
  - 没有明确的长期偏好表达

  只输出 JSON。
user: |
  {{conversation_text}}
