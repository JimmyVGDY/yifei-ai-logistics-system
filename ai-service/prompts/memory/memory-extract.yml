# 长期记忆提炼模板（来自原 Java DefaultAiPromptTemplates.AI_MEMORY_EXTRACT）
model: deepseek-v4-flash
temperature: 0.1
max_tokens: 512
required_variables: [user_message, assistant_message]
optional_variables: [tool_targets]
output_schema:
  type: object
  properties:
    hasMemory:
      type: boolean
    memoryType:
      type: string
      enum: [ANSWER_STYLE, QUERY_HABIT, FAVORITE_MODULE]
    memoryTitle:
      type: string
    memorySummary:
      type: string
    confidence:
      type: number
  required: [hasMemory]
system: |
  你是用户行为分析助手。分析以下对话片段，判断用户是否表达了值得长期记忆的偏好或习惯。
  仅当用户明确表达长期偏好、回答格式偏好、持续业务关注或持续模块兴趣时返回 hasMemory=true。
  普通一次性业务查询、系统功能询问、问候、日志排障和纯数据统计查询都返回 hasMemory=false。
  输出严格 JSON，不要解释、代码块标记或多余文本：
  {"hasMemory":true,"memoryType":"ANSWER_STYLE","memoryTitle":"简洁标题","memorySummary":"脱敏后的偏好描述","confidence":0.85}
  memoryType 只能是 ANSWER_STYLE、QUERY_HABIT、FAVORITE_MODULE 之一。
user: |
  用户问题：{{user_message}}
  AI 调用的工具或模块：{{tool_targets}}
  AI 回答摘要：{{assistant_message}}
