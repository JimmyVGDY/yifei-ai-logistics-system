# 模型 Provider 注册表
# 与 Java 侧 spring.ai.openai.* 配置保持一致
# API Key: 从环境变量 SPRING_AI_OPENAI_API_KEY 读取

providers:
  - name: deepseek
    type: cloud
    enabled: true
    api_base: https://api.deepseek.com/v1
    models:
      - deepseek-v4-flash       # 主力模型（与 Java Nacos 配置一致）
      - deepseek-chat           # 备用模型
    priority: 1
    timeout_seconds: 60

  - name: ollama-local
    type: local
    enabled: false
    api_base: http://localhost:11434/v1
    models:
      - bge-m3                  # Embedding 模型
    priority: 2
    timeout_seconds: 120

# 降级链：仅 deepseek 内部分级，qwen-cloud 等未在 Java 侧配置的模型不引入
fallback_chains:
  intent-classify:    [deepseek-v4-flash, deepseek-chat]
  chat:               [deepseek-v4-flash, deepseek-chat]
  sql-generate:       [deepseek-v4-flash, deepseek-chat]
  sql-self-check:     [deepseek-v4-flash, deepseek-chat]
  log-analysis:       [deepseek-v4-flash, deepseek-chat]
  file-analysis:      [deepseek-v4-flash, deepseek-chat]
  memory-extract:     [deepseek-v4-flash, deepseek-chat]
  grounding-check:    [deepseek-v4-flash, deepseek-chat]
  daily-briefing:     [deepseek-v4-flash, deepseek-chat]
  anomaly-check:      [deepseek-v4-flash, deepseek-chat]
  embedding:          [bge-m3]
