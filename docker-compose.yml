# 物流管理平台 —— 全栈服务编排
# 启动: docker compose up -d
# 停止: docker compose down
# 查看: docker compose ps
# 日志: docker compose logs -f app

version: "3.8"

services:
  # ==================== 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: logistics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-***}
      MYSQL_DATABASE: logistics_management
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-***}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - logistics-net

  # ==================== 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - logistics-net

  # ==================== 消息队列 ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logistics-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - logistics-net

  # ==================== 搜索引擎 ====================
  elasticsearch:
    image: elasticsearch:7.17.0
    container_name: logistics-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - logistics-net

  # ==================== 注册/配置中心 ====================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: logistics-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "${NACOS_PORT:-8848}:8848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - logistics-net

  # ==================== 流量控制 ====================
  sentinel:
    build:
      context: ./docker/sentinel
    container_name: logistics-sentinel
    restart: unless-stopped
    ports:
      - "${SENTINEL_PORT:-8858}:8858"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8858/ | head -c 10"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - logistics-net

  # ==================== 应用服务（需先 mvn package） ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logistics-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      # 数据库
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/logistics_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-***}
      SPRING_SQL_INIT_MODE: never
      # 中间件（容器网络内使用服务名即可通信）
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      NACOS_SERVER_ADDR: nacos:8848
      # 前端（容器内不自动打开浏览器）
      LOCAL_FRONTEND_AUTO_START: "false"
      LOCAL_FRONTEND_AUTO_OPEN: "false"
      # 日志
      LOG_FILE: /app/logs/logistics-management.log
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/actuator/health | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - logistics-net

# ==================== 存储卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  es_data:
    driver: local
  nacos_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local

# ==================== 网络 ====================
networks:
  logistics-net:
    driver: bridge
    name: logistics-net
